# Recipe (T32.9, ADR-0043): secret scanning — no VERIFIED secret.
#
# TruffleHog emits newline-delimited JSON under `--json`, one object per finding,
# each carrying `"Verified":true` when it actively confirmed the credential is
# live (it called the provider) and `"Verified":false` for an unconfirmed
# pattern match. The `match_count` verdict counts the lines that assert
# `"Verified":true` and passes only when that count is zero.
#
# EXIT-CODE GOTCHA: TruffleHog exits 0 even WITH findings unless you pass `--fail`
# (which then exits 183 for any result, verified or not). So the verdict is gated
# on the PARSED output, never the exit code — `match_count` reads the signal
# straight out of the JSON stream.
#
# Evidence tier: DEMONSTRATION (fail directly). A `Verified:true` secret was
# live-confirmed against its provider — a demonstration, safe to fail on directly.
# (Unverified matches are noisier CLAIMS; route those through a baseline ratchet
# if you want to gate on them — see recipe_iac_scan.toml.)
#
#     kazi apply priv/examples/recipe_secret_trufflehog.toml --workspace .
#
# See docs/custom-script-recipes.md and `kazi schema custom_script`.

id = "recipe-secret-trufflehog"
name = "Secrets: no verified secret in the tree"

[[predicate]]
id = "no-verified-secret"
provider = "custom_script"
description = "TruffleHog finds zero live-verified secrets (gated on parsed JSON, not exit code)"
cmd = "trufflehog"
args = ["filesystem", ".", "--json"]
verdict = "match_count"
match_regex = "\"Verified\"\\s*:\\s*true"
pass_when = "== 0"
