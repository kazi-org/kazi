# Recipe (T32.9, ADR-0043): consumer-contract safety — safe to deploy.
#
# `pact-broker can-i-deploy` asks the broker whether a given application version
# is compatible with everything already deployed to a target environment. It
# exits 0 only when every required consumer/provider verification has passed, and
# non-zero otherwise — so `exit_zero` is the verdict.
#
# Evidence tier: DEMONSTRATION (fail directly). The verdict is backed by recorded
# verification results between concrete pacticipant versions, not a heuristic.
#
#     kazi apply priv/examples/recipe_contract_pact.toml --workspace .
#
# Set PACT_BROKER_BASE_URL / PACT_BROKER_TOKEN in your environment and adapt the
# pacticipant + version. kazi passes `args` to the executable VERBATIM (no shell or
# env expansion), so substitute the concrete version (e.g. the commit SHA) before
# running. See docs/custom-script-recipes.md and `kazi schema custom_script`.

id = "recipe-contract-pact"
name = "Consumer contracts: safe to deploy"

[[predicate]]
id = "can-i-deploy"
provider = "custom_script"
description = "pact-broker can-i-deploy confirms the version is compatible with production"
cmd = "pact-broker"
args = [
  "can-i-deploy",
  "--pacticipant", "checkout-api",
  "--version", "0.0.0-replace-with-your-version",
  "--to-environment", "production",
]
verdict = "exit_zero"
