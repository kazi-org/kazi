name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: mix format + test
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
      ELIXIR_VERSION: "1.20.1"
      OTP_VERSION: "28.3"
      # T51.2 (ADR-0067): Kazi.Daemon.start/1 supervises nats-server
      # unconditionally, so the daemon test suite needs it on PATH.
      NATS_SERVER_VERSION: "2.10.24"
      NATS_SERVER_SHA256_LINUX_AMD64: "ee6500f364e3a741b496ae0296c04f2a9d53bbaabac457104ac74596b4a59d85"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Erlang/OTP and Elixir
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Install nats-server (pinned + checksum-verified)
        shell: bash
        run: |
          set -euo pipefail
          url="https://github.com/nats-io/nats-server/releases/download/v${NATS_SERVER_VERSION}/nats-server-v${NATS_SERVER_VERSION}-linux-amd64.tar.gz"
          curl -fsSL --retry 5 --retry-all-errors "$url" -o /tmp/nats-server.tar.gz
          echo "${NATS_SERVER_SHA256_LINUX_AMD64}  /tmp/nats-server.tar.gz" | sha256sum -c -
          tar -xzf /tmp/nats-server.tar.gz -C /tmp
          sudo install -m 0755 "/tmp/nats-server-v${NATS_SERVER_VERSION}-linux-amd64/nats-server" /usr/local/bin/nats-server
          nats-server -v

      - name: Cache deps and _build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run tests
        run: mix test
