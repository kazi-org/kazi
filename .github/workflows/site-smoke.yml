name: Site smoke

# T9.5 (ADR-0018): Playwright smoke test for the kazi website. Runs on PRs that
# touch the site so a broken page (missing hero, wrong install string, dead
# GitHub link, console error, broken mobile layout) fails before it can deploy.
# The README <-> website coherence drift-check (T9.9) runs alongside it.

on:
  pull_request:
    paths:
      - "site/**"
      - ".github/workflows/site-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: README <-> website coherence check (T9.9)
        run: npm run check:coherence

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Smoke test (Playwright against built dist/)
        run: npm test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: site/playwright-report
          retention-days: 7
