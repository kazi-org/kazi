name: Pages

# T9.3 (ADR-0018): build the Astro site in site/ and deploy it to GitHub Pages.
# Triggers on pushes to main that touch the site (or this workflow), plus manual
# dispatch. The README <-> website coherence drift-check (T9.9) gates the build,
# so a divergence between site/src/canonical.mjs and README.md fails the deploy.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "README.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish (don't cancel a live deploy).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: README <-> website coherence check (T9.9)
        run: npm run check:coherence

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
