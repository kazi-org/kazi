# The curated manifest of SIGNIFICANT SHIPPED FEATURES an essay should cover.
# This file is the single source of truth for essay coverage
# (check_essay_coverage.py reads it; the essays.goal.toml standing goal drives
# it). Adding a significant feature to kazi means adding a row here — the same
# "docs land with the code" discipline as ADR-0034.
#
# anchors: the files that DEFINE the feature. An essay is stale when any anchor
# has a git commit newer than the essay's `reviewed:` date.

