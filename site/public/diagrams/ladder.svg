<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 620" width="760" height="620" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="The rung ladder from vibe coding to reconciliation. From the bottom up: 1 prompt by feel, 2 persistent context, 3 knowledge tiers, 4 verify to prod, 5 code graph and context economy, 6 prompts become skills, 7 a written plan, 8 an honest definition of done, 9 many agents safely, 10 the reconcile pattern, 11 kazi proves done, 12 your on-ramp. You can start at any rung.">
  <defs>
    <linearGradient id="ld-rung" x1="0" y1="64" x2="0" y2="556" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="0.5" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <marker id="ld-arrow" markerWidth="11" markerHeight="11" refX="5" refY="2.5" orient="auto">
      <path d="M0 6 L5 0 L10 6 Z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="758" height="618" rx="14" fill="#0b1220" stroke="#1e293b" stroke-width="1.5"/>

  <!-- direction label + ascent arrow -->
  <text x="30" y="36" font-size="13" font-weight="600" fill="#8b5cf6">Reconciliation &#9650;</text>
  <line x1="40" y1="556" x2="40" y2="74" stroke="#334155" stroke-width="2" marker-end="url(#ld-arrow)"/>
  <text x="30" y="588" font-size="13" font-weight="600" fill="#22d3ee">Vibe coding &#9660;</text>

  <!-- rails -->
  <line x1="92" y1="56" x2="92" y2="548" stroke="#334155" stroke-width="3"/>
  <line x1="152" y1="56" x2="152" y2="548" stroke="#334155" stroke-width="3"/>

  <!-- rungs (bottom = part 1, top = part 12) -->
  <g font-size="14.5" fill="#cbd5e1">
    <g><line x1="92" y1="540" x2="152" y2="540" stroke="url(#ld-rung)" stroke-width="3"/><circle cx="92" cy="540" r="13" fill="url(#ld-rung)"/><text x="92" y="545" text-anchor="middle" font-size="12" font-weight="700" fill="#0b1220">1</text><text x="174" y="545">Prompt by feel</text></g>
    <g><line x1="92" y1="497" x2="152" y2="497" stroke="url(#ld-rung)" stroke-width="3"/><circle cx="92" cy="497" r="13" fill="url(#ld-rung)"/><text x="92" y="502" text-anchor="middle" font-size="12" font-weight="700" fill="#0b1220">2</text><text x="174" y="502">Persistent context</text></g>
    <g><line x1="92" y1="453" x2="152" y2="453" stroke="url(#ld-rung)" stroke-width="3"/><circle cx="92" cy="453" r="13" fill="url(#ld-rung)"/><text x="92" y="458" text-anchor="middle" font-size="12" font-weight="700" fill="#0b1220">3</text><text x="174" y="458">Knowledge tiers</text></g>
    <g><line x1="92" y1="410" x2="152" y2="410" stroke="url(#ld-rung)" stroke-width="3"/><circle cx="92" cy="410" r="13" fill="url(#ld-rung)"/><text x="92" y="415" text-anchor="middle" font-size="12" font-weight="700" fill="#0b1220">4</text><text x="174" y="415">Verify all the way to prod</text></g>
    <g><line x1="92" y1="366" x2="152" y2="366" stroke="url(#ld-rung)" stroke-width="3"/><circle cx="92" cy="366" r="13" fill="url(#ld-rung)"/><text x="92" y="371" text-anchor="middle" font-size="12" font-weight="700" fill="#0b1220">5</text><text x="174" y="371">Code graph &#43; context economy</text></g>
    <g><line x1="92" y1="323" x2="152" y2="323" stroke="url(#ld-rung)" stroke-width="3"/><circle cx="92" cy="323" r="13" fill="url(#ld-rung)"/><text x="92" y="328" text-anchor="middle" font-size="12" font-weight="700" fill="#0b1220">6</text><text x="174" y="328">Prompts become skills</text></g>
    <g><line x1="92" y1="280" x2="152" y2="280" stroke="url(#ld-rung)" stroke-width="3"/><circle cx="92" cy="280" r="13" fill="url(#ld-rung)"/><text x="92" y="285" text-anchor="middle" font-size="12" font-weight="700" fill="#0b1220">7</text><text x="174" y="285">A written, checkable plan</text></g>
    <g><line x1="92" y1="236" x2="152" y2="236" stroke="url(#ld-rung)" stroke-width="3"/><circle cx="92" cy="236" r="13" fill="url(#ld-rung)"/><text x="92" y="241" text-anchor="middle" font-size="12" font-weight="700" fill="#0b1220">8</text><text x="174" y="241">An honest definition of done</text></g>
    <g><line x1="92" y1="193" x2="152" y2="193" stroke="url(#ld-rung)" stroke-width="3"/><circle cx="92" cy="193" r="13" fill="url(#ld-rung)"/><text x="92" y="198" text-anchor="middle" font-size="12" font-weight="700" fill="#0b1220">9</text><text x="174" y="198">Many agents, safely</text></g>
    <g><line x1="92" y1="150" x2="152" y2="150" stroke="url(#ld-rung)" stroke-width="3"/><circle cx="92" cy="150" r="13" fill="url(#ld-rung)"/><text x="92" y="155" text-anchor="middle" font-size="11" font-weight="700" fill="#0b1220">10</text><text x="174" y="155">The reconcile pattern</text></g>
    <g><line x1="92" y1="106" x2="152" y2="106" stroke="url(#ld-rung)" stroke-width="3"/><circle cx="92" cy="106" r="13" fill="url(#ld-rung)"/><text x="92" y="111" text-anchor="middle" font-size="11" font-weight="700" fill="#0b1220">11</text><text x="174" y="111">kazi: &#8220;done,&#8221; proven</text></g>
    <g><line x1="92" y1="63" x2="152" y2="63" stroke="url(#ld-rung)" stroke-width="3"/><circle cx="92" cy="63" r="13" fill="url(#ld-rung)"/><text x="92" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#0b1220">12</text><text x="174" y="68" font-weight="700" fill="#e2e8f0">Your on-ramp &#8594; reconciliation</text></g>
  </g>

  <text x="174" y="600" font-size="12" fill="#64748b">Each rung is independently useful &#8212; you can start at any rung.</text>
</svg>
