<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" width="960" height="360" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="The kazi reconcile loop: observe, diff, dispatch, re-observe, decide — repeating. While predicates still fail the loop dispatches the coding agent again; it exits only when the goal is converged, or honestly stuck, or over budget.">
  <defs>
    <linearGradient id="rl-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <marker id="rl-arrow" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0 0 L6.5 3 L0 6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- panel -->
  <rect x="1" y="1" width="958" height="358" rx="14" fill="#0b1220" stroke="#1e293b" stroke-width="1.5"/>

  <!-- heading -->
  <text x="28" y="42" font-size="17" font-weight="700" fill="#e2e8f0">The reconcile loop</text>
  <text x="28" y="64" font-size="12.5" fill="#94a3b8">Declare the goal as predicates; kazi drives a coding agent until they are objectively true.</text>

  <!-- five stages -->
  <g>
    <!-- 1 Observe -->
    <rect x="24" y="120" width="150" height="62" rx="10" fill="#0f1a2e" stroke="#334155"/>
    <rect x="24" y="120" width="150" height="4" rx="2" fill="url(#rl-grad)"/>
    <text x="99" y="148" text-anchor="middle" font-size="15" font-weight="600" fill="#e2e8f0">Observe</text>
    <text x="99" y="166" text-anchor="middle" font-size="11" fill="#64748b">evaluate every predicate</text>
    <!-- 2 Diff -->
    <rect x="196" y="120" width="150" height="62" rx="10" fill="#0f1a2e" stroke="#334155"/>
    <rect x="196" y="120" width="150" height="4" rx="2" fill="url(#rl-grad)"/>
    <text x="271" y="148" text-anchor="middle" font-size="15" font-weight="600" fill="#e2e8f0">Diff</text>
    <text x="271" y="166" text-anchor="middle" font-size="11" fill="#64748b">desired vs actual</text>
    <!-- 3 Dispatch -->
    <rect x="368" y="120" width="150" height="62" rx="10" fill="#0f1a2e" stroke="#334155"/>
    <rect x="368" y="120" width="150" height="4" rx="2" fill="url(#rl-grad)"/>
    <text x="443" y="148" text-anchor="middle" font-size="15" font-weight="600" fill="#e2e8f0">Dispatch</text>
    <text x="443" y="166" text-anchor="middle" font-size="11" fill="#64748b">hand the failing slice to an agent</text>
    <!-- 4 Re-observe -->
    <rect x="540" y="120" width="150" height="62" rx="10" fill="#0f1a2e" stroke="#334155"/>
    <rect x="540" y="120" width="150" height="4" rx="2" fill="url(#rl-grad)"/>
    <text x="615" y="148" text-anchor="middle" font-size="15" font-weight="600" fill="#e2e8f0">Re-observe</text>
    <text x="615" y="166" text-anchor="middle" font-size="11" fill="#64748b">re-check the predicates</text>
    <!-- 5 Decide -->
    <rect x="712" y="120" width="150" height="62" rx="10" fill="#0f1a2e" stroke="#334155"/>
    <rect x="712" y="120" width="150" height="4" rx="2" fill="url(#rl-grad)"/>
    <text x="787" y="148" text-anchor="middle" font-size="15" font-weight="600" fill="#e2e8f0">Decide</text>
    <text x="787" y="166" text-anchor="middle" font-size="11" fill="#64748b">converged · stuck · over budget</text>
  </g>

  <!-- forward arrows between stages -->
  <g stroke="#475569" stroke-width="1.6" marker-end="url(#rl-arrow)">
    <line x1="176" y1="151" x2="192" y2="151"/>
    <line x1="348" y1="151" x2="364" y2="151"/>
    <line x1="520" y1="151" x2="536" y2="151"/>
    <line x1="692" y1="151" x2="708" y2="151"/>
  </g>

  <!-- feedback arc: still failing -> dispatch again -->
  <path d="M787 184 C 787 268, 99 268, 99 186" fill="none" stroke="#475569" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#rl-arrow)"/>
  <rect x="318" y="240" width="250" height="18" rx="4" fill="#0b1220"/>
  <text x="443" y="253" text-anchor="middle" font-size="12" fill="#94a3b8">predicates still failing &#8594; dispatch again</text>

  <!-- exit from Decide: converged, or an honest stop -->
  <line x1="787" y1="184" x2="787" y2="296" stroke="#475569" stroke-width="1.6" marker-end="url(#rl-arrow)"/>
  <rect x="712" y="300" width="150" height="30" rx="8" fill="#0f2a1f" stroke="#14532d"/>
  <text x="787" y="320" text-anchor="middle" font-size="13" font-weight="600" fill="#34d399">&#10003; converged</text>
  <g font-size="12">
    <text x="300" y="319" fill="#64748b">&#8230; or it stops honestly:</text>
    <text x="446" y="319" font-weight="600" fill="#fbbf24">stuck</text>
    <text x="486" y="319" fill="#64748b">&#183;</text>
    <text x="498" y="319" font-weight="600" fill="#f87171">over budget</text>
  </g>
</svg>
