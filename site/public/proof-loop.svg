<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 372" width="820" height="372" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-label="kazi reconcile loop converging: iterations 1 to 4 drive failing predicates to zero, then go test passes and the deployed GET /livez returns ok — converged.">
  <!-- window -->
  <rect x="1" y="1" width="818" height="370" rx="12" fill="#0b1220" stroke="#1e293b" stroke-width="1.5"/>
  <!-- title bar -->
  <path d="M1 13 a12 12 0 0 1 12 -12 h794 a12 12 0 0 1 12 12 v25 h-818 z" fill="#0f1a2e"/>
  <line x1="1" y1="38" x2="819" y2="38" stroke="#1e293b" stroke-width="1"/>
  <circle cx="22" cy="19" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="19" r="6" fill="#febc2e"/>
  <circle cx="62" cy="19" r="6" fill="#28c840"/>
  <text x="410" y="24" text-anchor="middle" font-size="12.5" fill="#64748b">kazi — health-green-and-live</text>

  <g font-size="14.5">
    <!-- command -->
    <text x="24" y="72"><tspan fill="#475569">$</tspan><tspan fill="#e2e8f0" dx="9">kazi run my-goal.toml --workspace ./my-service</tspan></text>

    <!-- reconcile loop: failing set shrinks red/amber -> green -->
    <text x="24" y="112" fill="#475569">kazi.loop</text>
    <text x="124" y="112" fill="#94a3b8">iter=1</text>
    <text x="196" y="112" fill="#fbbf24">failing=[tests, livez]</text>
    <text x="496" y="112" fill="#60a5fa">→ dispatch agent</text>

    <text x="24" y="138" fill="#475569">kazi.loop</text>
    <text x="124" y="138" fill="#94a3b8">iter=2</text>
    <text x="196" y="138" fill="#fbbf24">failing=[livez]</text>
    <text x="496" y="138" fill="#60a5fa">→ integrate · PR #42</text>

    <text x="24" y="164" fill="#475569">kazi.loop</text>
    <text x="124" y="164" fill="#94a3b8">iter=3</text>
    <text x="196" y="164" fill="#fbbf24">failing=[livez]</text>
    <text x="496" y="164" fill="#60a5fa">→ deploy</text>

    <text x="24" y="190" fill="#475569">kazi.loop</text>
    <text x="124" y="190" fill="#94a3b8">iter=4</text>
    <text x="196" y="190" fill="#34d399">failing=[]</text>
    <text x="496" y="190" fill="#34d399">✓ CONVERGED</text>

    <!-- evidence panel: every predicate objectively true -->
    <line x1="24" y1="214" x2="796" y2="214" stroke="#1e293b" stroke-width="1"/>
    <text x="40" y="248" fill="#34d399">✓</text>
    <text x="66" y="248" fill="#cbd5e1">go test ./...</text>
    <text x="360" y="248" fill="#64748b">passes</text>

    <text x="40" y="276" fill="#34d399">✓</text>
    <text x="66" y="276" fill="#cbd5e1">GET /livez → 200 "ok"</text>
    <text x="360" y="276" fill="#64748b">live</text>

    <!-- outcome -->
    <text x="24" y="330"><tspan fill="#94a3b8">OUTCOME:</tspan><tspan fill="#34d399" font-weight="bold" dx="9">converged</tspan><tspan fill="#475569" dx="12">·  done is observed, not asserted</tspan></text>
  </g>
</svg>
