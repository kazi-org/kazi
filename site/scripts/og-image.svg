<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="kazi - the missing outer loop for coding agents">
  <title>kazi - the missing outer loop for coding agents</title>
  <defs>
    <!-- Slate backdrop matching the site (ink to deep slate). -->
    <linearGradient id="bg" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <!-- The kazi reconcile-loop gradient: cyan -> blue -> violet. -->
    <linearGradient id="grad" gradientUnits="userSpaceOnUse" x1="80" y1="80" x2="480" y2="480">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)"/>
  <!-- soft brand glow, top-right -->
  <ellipse cx="980" cy="120" rx="460" ry="320" fill="url(#glow)"/>

  <!-- Mark: reconcile loop converging to a checkmark (scaled from the 96x96 mark). -->
  <g transform="translate(96,150) scale(1.45)">
    <path d="M 63 22 A 30 30 0 1 1 33 22"
          fill="none" stroke="url(#grad)" stroke-width="8.5" stroke-linecap="round"/>
    <path d="M 32 49 L 44 60 L 66 33"
          fill="none" stroke="url(#grad)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="252" y="262"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="120" font-weight="800" letter-spacing="-4" fill="#FFFFFF">kazi</text>

  <!-- Positioning (canonical string). -->
  <text x="98" y="372"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="46" font-weight="700" letter-spacing="-1" fill="url(#grad)">the missing outer loop for coding agents</text>

  <!-- Tagline lines. -->
  <text x="98" y="452"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="38" font-weight="400" fill="#CBD5E1">Describe what &#8220;done&#8221; looks like.</text>
  <text x="98" y="504"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="38" font-weight="400" fill="#CBD5E1">kazi makes it true &#8212; and proves it.</text>

  <!-- Footer row: install + license. -->
  <text x="98" y="582"
        font-family="'SF Mono', 'Menlo', monospace"
        font-size="26" font-weight="400" fill="#64748B">$ brew install kazi-org/tap/kazi</text>
  <text x="1102" y="582" text-anchor="end"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="26" font-weight="600" fill="#94A3B8">Apache-2.0</text>
</svg>
