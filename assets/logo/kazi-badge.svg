<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="kazi">
  <title>kazi</title>
  <defs>
    <!-- Subtle slate depth so the badge background is not a flat block. -->
    <linearGradient id="kaziBg" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="96" y2="96">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <!-- Vibrant mark gradient (brightened for contrast on dark slate). -->
    <linearGradient id="kaziGrad" gradientUnits="userSpaceOnUse" x1="16" y1="16" x2="80" y2="80">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <!-- App-icon / favicon / avatar badge: rounded square in slate, vibrant mark. -->
  <rect x="0" y="0" width="96" height="96" rx="22" fill="url(#kaziBg)"/>
  <g transform="translate(13.5,13.5) scale(0.72)">
    <path d="M 63 22 A 30 30 0 1 1 33 22"
          fill="none" stroke="url(#kaziGrad)" stroke-width="8.5" stroke-linecap="round"/>
    <path d="M 32 49 L 44 60 L 66 33"
          fill="none" stroke="url(#kaziGrad)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
