<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="kazi">
  <title>kazi</title>
  <!-- the reconcile loop: an open ring (a cycle, gap at top) ... -->
  <path d="M 63 22 A 30 30 0 1 1 33 22"
        fill="none" stroke="#10B981" stroke-width="8.5" stroke-linecap="round"/>
  <!-- ... converging to a checkmark: predicates become objectively true (green) -->
  <path d="M 32 49 L 44 60 L 66 33"
        fill="none" stroke="#10B981" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
