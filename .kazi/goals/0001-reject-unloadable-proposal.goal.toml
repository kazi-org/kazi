id = "reject-unloadable-proposal"
name = "issue #945: kazi reject transitions a proposal whose stored goal no longer loads (rejection is a lifecycle write, not a validation)"

[[predicate]]
id = "reject-unloadable-test"
provider = "custom_script"
description = "TASK BRIEF (github issue #945): `kazi reject <ref>` currently fails when the stored proposal's goal JSON no longer loads under the current schema (e.g. a predicate carrying a removed config key like `expected_exit_code`), which makes exactly the stalest queue-noise rows unrejectable. Rejection is a pure lifecycle transition (proposed -> rejected) on the read-model row: it must NOT require the goal to deserialize. Fix `Kazi.Authoring.reject/1` (lib/kazi/authoring.ex) so reject succeeds regardless of whether the stored goal loads (optionally noting unloadability in the result for audit). `approve` MUST keep validating (approving an unloadable goal is a footgun) -- do not weaken it. Write test/kazi/authoring/reject_unloadable_test.exs covering: (1) a proposal row whose goal JSON contains an unknown config key is rejected successfully and its status becomes rejected; (2) the same row cannot be approved (approve still validates and errors); (3) a normal loadable proposal still rejects as before. PROCESS: work on branch task/reject-unloadable-proposal, small conventional commits (feat/fix/test/docs prefixes, lib/ vs test/ vs docs/ in separate commits), push with `git push -u origin task/reject-unloadable-proposal`. Update the CLI reject docs if kazi help text describes reject behavior. This predicate passes when the new test file passes."
cmd = "sh"
args = ["-c", 'env -i HOME="$HOME" PATH="$PATH" LANG="$LANG" MIX_ENV=test mix test test/kazi/authoring/reject_unloadable_test.exs']
timeout_ms = 300000

[[predicate]]
id = "full-suite-green"
provider = "custom_script"
description = "GUARD: the full ExUnit suite stays green -- the fix must not break approve validation or any other authoring behavior."
guard = true
cmd = "sh"
args = ["-c", 'env -i HOME="$HOME" PATH="$PATH" LANG="$LANG" MIX_ENV=test mix test']
timeout_ms = 600000

[[predicate]]
id = "format-clean"
provider = "custom_script"
description = "GUARD: mix format --check-formatted stays clean (CI enforces it)."
guard = true
cmd = "sh"
args = ["-c", 'env -i HOME="$HOME" PATH="$PATH" LANG="$LANG" MIX_ENV=test mix format --check-formatted']
timeout_ms = 120000

[[predicate]]
id = "landed"
provider = "custom_script"
description = "The work is COMMITTED and PUSHED: working tree clean, an upstream is set, and HEAD equals the upstream ref. Convergence with uncommitted or unpushed work is not done."
cmd = "sh"
args = ["-c", 'test -z "$(git status --porcelain)" && git rev-parse --abbrev-ref @{u} >/dev/null 2>&1 && [ "$(git rev-parse HEAD)" = "$(git rev-parse @{u})" ]']
timeout_ms = 30000
