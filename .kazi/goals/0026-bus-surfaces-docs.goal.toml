id = "teach-coherence-green"
provider = "custom_script"
description = "GUARD: teach-coherence (AGENTS.md/SKILL) + the mcp suite stay green."
guard = true
cmd = "sh"
args = ["-c", 'env -i HOME="$HOME" PATH="$PATH" LANG="$LANG" MIX_ENV=test TEST_SERVER=false mix test test/kazi/teach_coherence_test.exs test/kazi/mcp/']
timeout_ms = 300000

