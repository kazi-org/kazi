[[predicate]]
id = "landed"
provider = "custom_script"
description = "The NAMED task branch exists, is pushed, and is current with its remote (pinned to the branch, not HEAD)."
cmd = "sh"
args = ["-c", 'git rev-parse --verify refs/heads/task/bus-surfaces-docs >/dev/null 2>&1 && git rev-parse --verify refs/remotes/origin/task/bus-surfaces-docs >/dev/null 2>&1 && [ "$(git rev-parse task/bus-surfaces-docs)" = "$(git rev-parse origin/task/bus-surfaces-docs)" ] && [ -n "$(git log --oneline origin/main..task/bus-surfaces-docs)" ]']
timeout_ms = 30000
