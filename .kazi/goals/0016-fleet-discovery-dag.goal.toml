WRITE test/kazi/fleet/discovery_test.exs (pure fixtures under the test tmp dir; no harness, no execution): build a fixture directory of small goal files covering: A and B independent (disjoint scopes, no edges); C with [metadata] depends_on = [A's id] (explicit edge); D and E with OVERLAPPING [scope] paths and no explicit edge (inferred edge, ordered by file sequence). Assert: (1) --explain --json (drive Kazi.CLI.run(argv) or the fleet module directly; prefer the CLI seam so flag wiring is covered) yields the expected nodes, edges (kind-tagged: explicit vs inferred, inferred carries the overlapping paths), and frontiers (A,B,D in the first frontier, C after A, E after D -- or equivalent per your ordering rule); (2) a cycle (X depends_on Y, Y depends_on X) fails at load naming BOTH files; (3) a dangling depends_on (unknown goal id) fails naming the file and the declared ids; (4) a duplicate goal id across two files fails naming both; (5) goals with no scope paths get no inferred edges; (6) executing --fleet without --explain exits with the clear not-yet-implemented error (until T50.5 replaces it -- write the assertion so it is easy to delete then).

DOCS LAND WITH CODE (ADR-0034): cli.ex @flag_docs for --fleet; docs/orchestrator-recipe.md gains a fleet section: directory layout, [metadata] depends_on, scope-overlap inference and its escape hatches (explicit edges; narrower scopes), the --explain output. Cross-reference ADR-0065 decision 3 and ADR-0059 (.kazi/goals/ conventions).

PROCESS: branch task/fleet-discovery-dag off main; small conventional commits (lib/ vs test/ vs docs/ separate); push with -u. This predicate passes when the new test file passes.
