id = "pause-between-waves-resume"
name = "T50.3: --pause-between-waves stops an executing --parallel run at each frontier boundary with a resumable handle; kazi apply --resume continues it (issue #936 full ask)"

[[predicate]]
id = "pause-resume-test"
provider = "custom_script"
description = """
TASK BRIEF (epic E50 task T50.3, ADR-0065 decision 3, docs/adr/0065-safe-concurrent-work-serial-worktree-fleet.md; the full ask of github issue #936, whose minimal slice -- the frontier_complete stream event -- already shipped).

WHY: an operator supervising a multi-wave parallel run has no way to stop at a wave boundary, inspect, and continue. The frontier_complete event REPORTS the boundary (fire-and-forget, no barrier); #936 asks for a supervised-checkpoint MODE: pause there, exit cleanly, resume later. ADR-0065 lands it as one mechanism that T50.5 will reuse for fleet-node boundaries.

BUILD THIS: (1) new apply flag --pause-between-waves (only meaningful with --parallel on a needs-DAG/group goal; reject or warn-and-ignore otherwise -- pick one, document it): the DepScheduler stops at each frontier boundary AFTER emitting frontier_complete -- concretely, when a frontier's groups have all reached a terminal state and BEFORE dispatching any group of the next frontier, the run winds down instead of dispatching; (2) exit code 0, and the collective terminal JSON carries a resume handle: a resume_token (or the run_id) plus enough persisted state to continue; (3) `kazi apply --resume <token|run-id>` (no goal-file argument needed if the token resolves one, but accepting goal-file + --resume is fine too -- keep the UX minimal and documented) re-loads the goal, restores the completed groups' terminal statuses, and continues from the next frontier to the collective verdict; (4) durable state: persist the MINIMAL resume state to the shared read-model (a new table/projection is expected -- nothing persists scheduler state today): goal-set content hash, per-group terminal statuses (converged/stuck/over_budget/...), the set of frontier indices already reported, and the schema version. Token/handle embeds schema_version + the goal-set hash; a resume whose recomputed goal hash mismatches REFUSES loudly ('goal file changed since pause; re-run instead') -- risk R-E50-3; (5) without the flag, behavior is byte-identical (the pinned frontier_complete tests must keep passing untouched).

DESIGN NOTE -- pause point semantics: the DepScheduler is PIPELINED (no barrier: a later group dispatches the instant its needs are satisfied, dispatch_ready runs per cycle). 'Pause at a frontier boundary' therefore means: once --pause-between-waves is set, stop STARTING new groups whose frontier index is beyond the lowest not-yet-settled frontier... the simple, honest implementation is: when maybe_emit_frontier_events fires frontier_complete for frontier N, stop dispatching any further groups, let in-flight groups (already running, by pipelining) finish, then wind down and report. Document the exact semantics you implement in the moduledoc and the schema doc -- what matters is: deterministic stop, nothing lost, resume completes the run.

EXACT SEAMS (verified on main at v1.125.0): lib/kazi/scheduler/dep_scheduler.ex -- Kazi.Scheduler.DepScheduler (GenServer): dispatch_ready/1 (~374-403) recomputes ready/blocked via Kazi.Goal.DepGraph.evaluate/2 each cycle and calls maybe_emit_frontier_events/1 (~635) BEFORE starting newly-ready groups; emit_frontier_complete/2 (~653-665) builds %{event: "frontier_complete", frontier: index, groups: [%{id, status}]} and records the index in state.reported_frontiers (MapSet); state (~260-285) holds goal, states (group -> :pending|:running|:converged|:stuck|:over_budget|:blocked), outcomes, frontiers (precomputed by DepGraph.frontiers/1), running/ref_to_group monitors. CLI: run_goal_parallel/4 (lib/kazi/cli.ex ~1870) builds scheduler_opts; maybe_put_frontier_stream/2 (~1949) installs :on_frontier_complete -> emit_frontier_complete_event/1 (~1963, on-wire shape with schema_version 2); Kazi.Scheduler.run_goals/2 (lib/kazi/scheduler.ex ~313) forwards :on_frontier_complete via Keyword.take (~377) to DepScheduler.run/2 (~380) -- thread the new pause option the same way. Terminal JSON: collective_result_json/2 has TWO clauses (lib/kazi/cli.ex ~4897 flat 'partitions', ~4909 DAG 'schedule'+'blocked') -- the resume handle goes in the DAG clause (and keep schema_version 2: additive fields only, per the ADR-0041/0046 discipline); rendered by report_collective/3 (~4828); exit code collective_exit_code/1 (~2007) -- a PAUSED run must map to 0. Read-model precedent for a new table: lib/kazi/read_model/run.ex + its migration (priv/repo/migrations/20260704090000_create_runs.exs and 7 additive siblings) and the registry pattern Kazi.ReadModel.RunRegistry (sole reader/writer). Flags: @switches/@flag_docs/apply flags allow-list/parse_run in lib/kazi/cli.ex as usual; --resume needs a parse_command path too (mirror how apply <proposal-ref> vs <goal-file> disambiguates, ~parse_run).

PINNED BEHAVIOR TO NOT BREAK: test/kazi/scheduler/frontier_complete_event_test.exs (4 tests) -- event fires after a frontier settles and before the next dispatches; final event precedes the terminal result; JSON round-trip; no-callback unchanged.

WRITE test/kazi/scheduler/pause_between_waves_test.exs (stub harness / no dispatch fixtures, mirroring frontier_complete_event_test.exs setup): (1) a 2-frontier fixture (two independent groups at frontier 0; one group with needs on a frontier-0 group at frontier 1) run with pause-between-waves stops after frontier 0: NO frontier-1 group is ever dispatched, exit path returns the paused collective result carrying the resume handle and the frontier-0 group statuses; (2) resuming with the handle completes frontier 1 to the collective verdict, and the union of both runs' outcomes equals a run without the flag; (3) a resume with a TAMPERED/mismatched goal (edit the fixture goal between pause and resume) refuses loudly with a clear error, exit nonzero; (4) without the flag, behavior is unchanged (frontier events still fire per the existing pinned tests -- run them). Persisted state must survive process death: pause and resume in SEPARATE scheduler/process lifecycles (the read-model is the bridge), not a same-process in-memory continuation.

DOCS LAND WITH CODE (ADR-0034): docs/schemas/collective-result.md documents the paused status + resume handle fields; docs/orchestrator-recipe.md gets a supervised-checkpoint walkthrough (--parallel --pause-between-waves ... then kazi apply --resume ...); cli.ex @flag_docs covers both flags. Cross-reference ADR-0065 and issue #936.

PROCESS: branch task/pause-between-waves off main; small conventional commits (lib/ vs test/ vs docs/ vs priv/repo/migrations/ separate); push with -u. This predicate passes when the new test file passes.
"""
