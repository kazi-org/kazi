guard = true
cmd = "sh"
args = ["-c", 'env -i HOME="$HOME" PATH="$PATH" LANG="$LANG" MIX_ENV=test mix format --check-formatted']
timeout_ms = 120000

[[predicate]]
id = "landed"
provider = "custom_script"
description = "The NAMED task branch exists, is pushed, and is current with its remote (pinned to the branch, not HEAD)."
cmd = "sh"
args = ["-c", 'git rev-parse --verify refs/heads/task/worktree-liveness-guard >/dev/null 2>&1 && git rev-parse --verify refs/remotes/origin/task/worktree-liveness-guard >/dev/null 2>&1 && [ "$(git rev-parse task/worktree-liveness-guard)" = "$(git rev-parse origin/task/worktree-liveness-guard)" ] && [ -n "$(git log --oneline origin/main..task/worktree-liveness-guard)" ]']
timeout_ms = 30000
