description = "TASK BRIEF (ADR-0069 decision 2): the :claude profile's economy-flag map (Kazi.Harness.Profiles.Claude @economy_flags, T36.1/ADR-0047) already renders :exclude_dynamic_system_prompt_sections -> --exclude-dynamic-system-prompt-sections (version-gated), but nothing can SET it (no CLI flag, no goal-file key, DispatchSurface.minimal_default does not supply it) -- and there is no bare-mode opt at all, so every dispatch auto-discovers ambient host CLAUDE.md/hooks/plugins/auto-memory (upstream `claude -p` plans to default to --bare; kazi must own its choice explicitly first). DO: (a) add :bare -> --bare to @economy_flags as kind :boolean with a conservative min_version floor (same pattern as :exclude_dynamic_system_prompt_sections -- on an older CLI the flag is DROPPED, never emitted to a binary that would error; verify the actual Claude Code version that introduced --bare and use it as the floor, do not guess 1.0.0 blindly); add :bare to the :claude profile's supported_opts. (b) Make BOTH opts operator-reachable following the T36.6 --effort precedent exactly: a `kazi apply`/`kazi run` CLI flag each (--bare, --exclude-dynamic-system-prompt-sections), threaded CLI > goal-file [harness] key > absent, Claude-profile-only by design (only :claude advertises them in supported_opts so Kazi.Harness.resolve/1's opt-filtering drops them for other harnesses -- parity-by-design, mirror how :effort documents this). (c) OFF by default is non-negotiable: with neither opt supplied the rendered argv must be byte-for-byte unchanged -- extend test/kazi/harness/claude_economy_flags_test.exs pinning the unchanged-argv property, the rendered flags when set, the version-gate drop behavior for :bare, and the non-Claude-profile filtering. (d) Do NOT flip any default anywhere (no DispatchSurface change, no loop change) -- ADR-0069 decision 3 reserves flips for the T48.12 benchmark gate. (e) Docs land with code (ADR-0034): document both flags in the kazi help text, docs/add-a-harness.md's economy-flag list if it has one, and a pointer to ADR-0069's benchmark-gate rule for anyone tempted to default them on. PROCESS: branch task/argv-levers-reachable, conventional commits, push with -u."
cmd = "sh"
args = ["-c", 'env -i HOME="$HOME" PATH="$PATH" LANG="$LANG" MIX_ENV=test TEST_SERVER=false mix test test/kazi/harness/claude_economy_flags_test.exs test/kazi/harness/']
timeout_ms = 600000

