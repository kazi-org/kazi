[[predicate]]
id = "economy-cache-ratio"
provider = "custom_script"
description = "TASK BRIEF (ADR-0069 decision 1): kazi ALREADY parses the Anthropic cache split per dispatch (Kazi.Harness.Profiles.Claude.parse/1, T34.2: cache_read_input_tokens -> :cached_input_tokens, cache_creation_input_tokens -> :cache_write_tokens, honest-unknown fidelity-tagged) and ALREADY persists cached-input tokens per run (T48.7, budget_cached_input_tokens on Kazi.ReadModel.Run) -- but Kazi.Economy.History.aggregate/1's groups expose only tokens/cost_usd/dispatch_count/wall_clock_s percentiles, so `kazi economy` cannot show whether a goal-shape bucket's dispatches actually reuse the harness prompt cache. ADD the cached dimension to the aggregate: (a) each {goal_shape_bucket, model, harness} group gains a `cached_input_tokens` percentile pair (p50/p95, nearest-rank like the existing metrics) AND a `cache_read_ratio` percentile pair, where a run's ratio = cached_input / (cached_input + fresh input_tokens) -- compute per-run then percentile, do NOT ratio the percentiles; skip a run from the ratio input when EITHER side is unreported (ADR-0046 honest-unknown: excluded, never coerced to 0; a group with no reporting runs renders null for both new metrics -- n_with_usage already conveys density; check whether the existing history row carries fresh input_tokens split from the total -- if only the summed total and cached are persisted, derive fresh = total - cached ONLY when both are non-nil, else exclude the run). (b) Render both in `kazi economy` human output and --json; the --json change is ADDITIVE -- bump schema_version per the existing contract (docs/economy.md currently documents schema_version 2; follow whatever the schema-versioning convention in docs/schemas/ prescribes for additive keys). (c) Update docs/economy.md: document the two new group metrics, the per-run-ratio-then-percentile method, and the honest-unknown exclusion rule (ADR-0034: docs land with the code). Write test/kazi/economy/history_cache_ratio_test.exs pinning: percentile math on a mixed set (reporting + non-reporting runs), the exclusion rule (a nil on either side of the ratio excludes that run), the all-unreported group rendering null, and the --json shape (schema_version bumped, keys present). PROCESS: branch task/economy-cache-ratio, conventional commits, push with -u."
cmd = "sh"
args = ["-c", 'env -i HOME="$HOME" PATH="$PATH" LANG="$LANG" MIX_ENV=test TEST_SERVER=false mix test test/kazi/economy/history_cache_ratio_test.exs test/kazi/economy/']
timeout_ms = 600000

[[predicate]]
id = "argv-levers-reachable"
