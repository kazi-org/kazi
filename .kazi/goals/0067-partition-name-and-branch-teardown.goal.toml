id = "partition-name-and-branch-teardown"
name = "E54 T54.2 (#1074): partition name collision-proofing + branch teardown on terminal state + surfaced git error"

[metadata]
issue = "https://github.com/kazi-org/kazi/issues/1074"
epic = "E54"

[[predicate]]
id = "name-and-teardown"
provider = "custom_script"
description = "TASK BRIEF (github #1074). Two compounding defects let DISTINCT goals collide on a partition worktree/branch, and a leaked branch permanently blocks reuse. (1) lib/kazi/scheduler/worktree.ex:457-464 slug_for/1 does `String.slice(0,16)` with no disambiguator, so `valyrium-issue-11`, `-12`, `-13` all slug to `valyrium-issue-1`. (2) worktree.ex:445 the per-run nonce is `:erlang.unique_integer([:positive,:monotonic])` which RESETS every OS process, so the first worktree of every fresh `kazi apply` gets the same low nonce -> identical branch `kazi-partition/p-valyrium-issue-1-1` across unrelated runs. create/5 (worktree.ex:244, `git worktree add -b`) then hard-fails `a branch named '...' already exists`, but the real git line is hidden in a Logger.warning (worktree.ex:171-173) while the CLI prints the generic `could not create an isolated task worktree` (cli.ex:2404-2415; fleet execution.ex:298-303). FIX: (a) derive the slug as a legible prefix of the key PLUS a short stable hash of the FULL key (e.g. sha256 hex, 8 chars) so distinct keys -> distinct slugs by construction; (b) replace the per-VM monotonic nonce with a cross-process-unique token (UUID / strong_rand_bytes hex, or system_time nanosecond + random) so two runs never mint the same branch; (c) on an `already exists` `-b` failure surface the REAL git message up to the CLI/JSON error, not the generic string; (d) delete the `kazi-partition/*` branch on ANY terminal state ONLY when it LANDED (merged) or is EMPTY (0 commits ahead of base) -- NEVER a branch carrying unlanded commits. LANDMINE: test/kazi/scheduler/serial_integration_test.exs:156-160 asserts an UNLANDED partition branch + its commit SURVIVE worktree removal -- branch deletion must be conditional, never blanket. Preserve worktree_test.exs:100-125 (distinct paths). PROCESS: branch task/partition-name-and-branch-teardown, conventional commits, push -u. Full design: docs/plans/E54.md T54.2."
cmd = "sh"
args = ["-c", 'env -i HOME="$HOME" PATH="$PATH" LANG="$LANG" MIX_ENV=test TEST_SERVER=false mix test test/kazi/scheduler/']
timeout_ms = 600000

