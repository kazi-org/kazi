id = "untrusted-diagnosis"
provider = "custom_script"
description = "TASK BRIEF (github #1072, regression of #769; operator chose ALL THREE behaviors: surface + warn + fail-fast refuse). A fresh worktree never run through Claude Code's trust dialog silently denies every tool call (docs/lore.md L-0023), producing `stuck` after 3 iterations / $0.46 / ZERO changes -- indistinguishable from genuine difficulty. kazi has NO trust detection (grep-confirmed). The RELIABLE signal is `:permission_denials`, already parsed from the default envelope (lib/kazi/harness/profiles/claude.ex:402-410) but DROPPED: the loop folds the dispatch result at lib/kazi/loop.ex:1950,1962-1996 WITHOUT capturing it (L-0023 'NOT YET DONE'). Do NOT rely on economy --rediscovery's `no tool-use stream` signal -- it is empty on EVERY default-envelope dispatch (weak). FIX (c, authoritative -- build first): thread permission_denials into loop Data (a record_permission_denials fold beside record_counters), and surface a distilled `permission_denied_tool_calls` + tool names on the terminal result (build_result/2 ~loop.ex:2830-2889) and stuck bundle (build_stuck_bundle/1 ~loop.ex:2947-2966), beside changed_files. FIX (a, warn): a pre-dispatch stderr warning in the run_goal/4 refusal seam (cli.ex:2146-2198, beside refuse_primary_workspace :2189-2191) when harness=claude AND no --permission-mode AND the workspace looks first-run; EXEMPT --check/--explain (read-only). FIX (b, fail-fast refuse): when the FIRST iteration shows the fingerprint (changed_files == [] AND cost_usd > 0 AND permission_denied_tool_calls > 0) TERMINATE immediately with the diagnosis + remedy (`pass --permission-mode bypassPermissions, or run Claude Code's trust dialog once`) instead of burning further iterations. A normal dispatch's terminal result must stay byte-identical to today (field absent). Docs land with the code (ADR-0034). PROCESS: branch task/untrusted-workspace-diagnosis, conventional commits, push -u. Full design: docs/plans/E54.md T54.6."
