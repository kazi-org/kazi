[[predicate]]
id = "status-lists-live-runs"
provider = "custom_script"
description = "TASK BRIEF (github issue #971): installing a newer burrito-built kazi binary can kill in-flight runs. ROOT CAUSE, already researched -- do not re-derive: the deletion happens entirely inside the VENDORED Zig dependency, NOT kazi's own Elixir code. deps/burrito/src/wrapper.zig:109-110 calls maint.do_clean_old_versions on EVERY launch; deps/burrito/src/maintenance.zig:75-108 (do_clean_old_versions/2) iterates sibling install dirs under ~/Library/Application Support/.burrito/ and unconditionally calls std.fs.deleteTreeAbsolute (maintenance.zig:104) on any older-version payload -- with NO PID/liveness check -- and this runs in native code BEFORE any BEAM/Elixir code loads, so there is no Elixir-side seam to intercept the deletion itself. Patching the vendored Zig (or keeping N-1 payloads with a liveness check) is a separate, larger effort explicitly OUT OF SCOPE for this goal -- do not attempt it.\nThis goal's SCOPE is the two mitigations the issue calls achievable now:\n(1) `kazi status` called with NO ref argument currently errors 'the status command requires a <ref> argument' (see lib/kazi/cli.ex, the status command's arg handling). Change this: with no ref, list every run the registry currently considers LIVE (status == \"running\" AND heartbeat fresher than the existing staleness window -- reuse lib/kazi/read_model/run_registry.ex's `@stale_after_seconds 90` / `stale?/2` and `list/0`, do NOT invent a new staleness definition). Support --json (an array of {goal_ref, run_id, status, heartbeat_age_s} or similar, schema_version-tagged like other --json outputs) and a human table for the prose path. This becomes the pre-upgrade check: an operator runs `kazi status` with no args before `brew upgrade`/re-installing to see what's live and wait it out.\n(2) Add a docs/lore.md entry (Release / CI / Burrito section, follow the existing L-00xx numbering/tag format used by L-0005/L-0019/L-0022/L-0032 in that section) naming this landmine precisely: burrito's do_clean_old_versions deletes an older version's unpacked ERTS payload unconditionally, even while a BEAM process built from that exact payload (a long apply run, or a standing `kazi dashboard`) is still executing; the process does not always crash immediately (it can run for a while on already-loaded/mmap'd pages) but WILL crash on its next lazy module load (observed: `io_lib_pretty,nofile` -> kernel logger crash -> Kernel pid terminated). Mitigation: run the new `kazi status` (no-ref) check first; never install/run a newer kazi binary while it reports any LIVE run. Cross-reference issue #971 and the new `kazi status` no-ref behavior from the lore entry.\nWrite test/kazi/cli/status_no_ref_test.exs (or extend an existing status CLI test) covering: no live runs -> empty list, exit 0; one live run (fresh heartbeat) -> included; one stale/dead run (old heartbeat or terminal status) -> excluded; --json shape is stable. PROCESS: branch task/burrito-upgrade-live-run-guard, small conventional commits (lib/ vs test/ vs docs/ separate), push with -u. This predicate passes when the new/extended test passes."
cmd = "sh"
args = ["-c", 'env -i HOME="$HOME" PATH="$PATH" LANG="$LANG" MIX_ENV=test mix test test/kazi/cli/']
timeout_ms = 300000

