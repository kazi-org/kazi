nd of the per-goal recipe, before 'Pin schema_version'): a complete, ready integration exporting a goal's group tree + verdicts to an Obsidian vault (notes + Mermaid rollup) for anyone who keeps notes in Obsidian.\nWrite/extend a coherence-style test (a new test/kazi/teach/skill_covers_commands_test.exs, or extend test/kazi/teach_coherence_test.exs) asserting the rendered SKILL.md text contains the literal substrings `kazi lint`, `kazi dashboard`, `kazi export`, and `economy --rediscovery`. PROCESS: branch task/skill-omits-lint-dashboard-export, small conventional commits, push with -u. This predicate passes when the new/extended test passes."
