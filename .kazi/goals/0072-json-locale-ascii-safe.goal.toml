id = "json-locale-ascii-safe"
name = "E54 T54.7 (#1076): --json is valid JSON regardless of the caller's locale (ASCII-safe encoding)"

[metadata]
issue = "https://github.com/kazi-org/kazi/issues/1076"
epic = "E54"

[[predicate]]
id = "json-ascii-safe"
provider = "custom_script"
description = "TASK BRIEF (github #1076). Under a non-UTF-8 locale (`env -i`) the `:standard_io` device is in latin1 mode, so `IO.puts(Jason.encode!(payload))` transcodes each non-ASCII codepoint to the literal 7-char `\\x{2014}` -- INVALID JSON that fails strict parsers. Jason itself is correct (raw UTF-8); the mangling is the IO write. Repro: `env -i PATH=\"$PATH\" HOME=\"$HOME\" kazi list-proposed --json | python3 -c 'import json,sys; json.load(sys.stdin)'`. This latently affects EVERY --json entrypoint, not just list-proposed. FIX: force ASCII-safe encoding -- Jason 1.4.5 (mix.lock:23) supports `escape: :unicode_safe` (emits `\\uXXXX`, locale-independent, verified). Add ONE private helper `Kazi.CLI.encode_json!/1` = `Jason.encode!(payload, escape: :unicode_safe)` and route EVERY --json write site through it: emit/3 (lib/kazi/cli.ex:1621) PLUS the direct sites emit_json_error (:1636), schema output (:1724,:1731,:1750), streaming NDJSON apply events (:2834,:3013), run_error_json (:2900). Do NOT mutate global `:io.setopts` (process-global, fights env -i). Human output (emit(false,...)) untouched. PROCESS: branch task/json-locale-ascii-safe, conventional commits, push -u. Full design: docs/plans/E54.md T54.7."
cmd = "sh"
args = ["-c", 'env -i HOME="$HOME" PATH="$PATH" LANG="$LANG" MIX_ENV=test TEST_SERVER=false mix test test/kazi/']
timeout_ms = 900000

