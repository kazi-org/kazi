id = "naked-grep-clarify-lint"
name = "issue #924: the plan clarify floor warns on naked text-presence (grep) predicates that can pass vacuously"

[[predicate]]
id = "grep-lint-test"
provider = "custom_script"
description = "TASK BRIEF (github issue #924): custom_script predicates that are a bare `grep -q <literal-or-simple-regex>` text match converge on vacuous/superficial matches -- string-stuffing an existing file, or matching unrelated pre-existing content -- hiding unbuilt features. Extend Kazi.Authoring.Clarify.gaps/2 (lib/kazi/authoring/clarify.ex, takes :draft in opts) to emit an ADVISORY clarify entry (id e.g. naked-grep-predicate, with an actionable prompt suggesting a negative-space companion assertion, a structural check, or a minimum-diff floor) when a drafted custom_script predicate's command amounts to a bare grep text-presence match (grep/-q/-rq/-rqiE style against a literal or simple regex) and the draft has NO companion predicate asserting the OLD pattern is absent. It is a WARN in the clarify array, never an approval blocker. Non-grep custom_script commands (mix test, go build, node scripts) must NOT trigger it. Write test/kazi/authoring/clarify_grep_lint_test.exs covering: (1) a draft whose only acceptance is a naked `grep -q` predicate yields a naked-grep-predicate clarify entry with a non-empty actionable prompt; (2) a draft where the grep predicate is paired with a companion absence assertion yields NO such entry; (3) a draft whose custom_script runs a test command (e.g. mix test) yields NO such entry; (4) the entry is advisory -- drafting/persisting still succeeds. Also add a short named anti-pattern note to docs/orchestrator-recipe.md (text-presence greps are satisfiable by string-stuffing and unrelated matches; pair them with negative-space or structural checks). PROCESS: branch task/naked-grep-clarify-lint, small conventional commits (lib/ vs test/ vs docs/ separate), push with -u. This predicate passes when the new test file passes."
cmd = "sh"
args = ["-c", 'env -i HOME="$HOME" PATH="$PATH" LANG="$LANG" MIX_ENV=test mix test test/kazi/authoring/clarify_grep_lint_test.exs']
timeout_ms = 300000

[[predicate]]
id = "full-suite-green"
provider = "custom_script"
description = "GUARD: the full ExUnit suite stays green -- existing clarify-floor behavior (live-target/scope gaps) must be preserved."
guard = true
cmd = "sh"
args = ["-c", 'env -i HOME="$HOME" PATH="$PATH" LANG="$LANG" MIX_ENV=test mix test']
timeout_ms = 600000

[[predicate]]
id = "format-clean"
provider = "custom_script"
description = "GUARD: mix format --check-formatted stays clean (CI enforces it)."
guard = true
cmd = "sh"
args = ["-c", 'env -i HOME="$HOME" PATH="$PATH" LANG="$LANG" MIX_ENV=test mix format --check-formatted']
timeout_ms = 120000

[[predicate]]
id = "landed"
provider = "custom_script"
description = "The work is COMMITTED and PUSHED: working tree clean, an upstream is set, and HEAD equals the upstream ref."
cmd = "sh"
args = ["-c", 'test -z "$(git status --porcelain)" && git rev-parse --abbrev-ref @{u} >/dev/null 2>&1 && [ "$(git rev-parse HEAD)" = "$(git rev-parse @{u})" ]']
timeout_ms = 30000
