apiVersion: kazi.io/v1
kind: KaziProject
metadata:
  name: my-go-project
  labels:
    language: go
    type: backend

spec:
  global:
    workspace: "."
    lintCommand: "go vet ./..."
    testCommand: "go test ./..."
    languageServer:
      name: gopls
      command: gopls
      timeout: 30s
    tokenLimit: 4000  # Default token limit for context

  rules:
    - Give each type a single, well-defined responsibility (Single Responsibility).
    - Extend behavior by adding new types or methods rather than modifying existing code (Open-Closed).
    - Ensure that substitutable types preserve intended behavior (Liskov Substitution).
    - Break larger interfaces into smaller, specialized ones (Interface Segregation).
    - Depend on abstractions, not concrete implementations (Dependency Inversion).
    - Prefer composition over inheritance to keep code simple and flexible.
    - Share memory by communicating (use goroutines and channels) rather than communicating by sharing memory.
    - Return errors explicitly and handle them consistently, avoiding exceptions.
    - Keep packages small and focused; each should have a single, clear purpose.
    - Document your code to clarify intent, especially for exported types and functions.

  prompts:
    - "Create a basic HTTP server with a GET /users endpoint that returns a list of users. Include a User struct with fields for ID, Name, and Email. Store users in memory for now."
    - "Add a POST /user endpoint that creates a new user. Validate that the name and email are not empty, and generate a unique ID for each user. Return appropriate HTTP status codes."
    - "Implement a DELETE /user/:id endpoint that removes a user by their ID. Return 404 if the user is not found and 200 on successful deletion."
    - "Add a PUT /user/:id endpoint to update an existing user's information. Validate the input and return appropriate status codes (404 if not found, 400 for invalid input, 200 for success)."
    - "Create a GET /products endpoint that returns a list of products. Include a Product struct with fields for ID, Name, Description, and Price. Store products in memory similar to users." 