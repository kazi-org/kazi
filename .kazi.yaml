apiVersion: kazi.io/v1
kind: KaziProject
metadata:
  name: todo-api
  labels:
    language: go
    type: backend

spec:
  global:
    workspace: "."
    lintCommand: "go vet ./..."
    testCommand: "go test ./..."
    languageServer:
      name: gopls
      command: gopls
      timeout: 30s
    tokenLimit: 4000  # Default token limit for context

  rules:
    - Give each type a single, well-defined responsibility (Single Responsibility).
    - Extend behavior by adding new types or methods rather than modifying existing code (Open-Closed).
    - Ensure that substitutable types preserve intended behavior (Liskov Substitution).
    - Break larger interfaces into smaller, specialized ones (Interface Segregation).
    - Depend on abstractions, not concrete implementations (Dependency Inversion).
    - Prefer composition over inheritance to keep code simple and flexible.
    - Share memory by communicating (use goroutines and channels) rather than communicating by sharing memory.
    - Return errors explicitly and handle them consistently, avoiding exceptions.
    - Keep packages small and focused; each should have a single, clear purpose.
    - Document your code to clarify intent, especially for exported types and functions.

  prompts:
    - "Create a complete REST API for a TODO app with the following features:
       - Use a clean architecture with separate layers for handlers, services, and repositories
       - Implement CRUD operations for todos (Create, Read, Update, Delete)
       - Each todo should have: ID, Title, Description, DueDate, Status (pending/completed), CreatedAt, UpdatedAt
       - Use in-memory storage for now but design for easy database integration later
       - Include proper error handling and validation
       - Add comprehensive test coverage for all components
       - Use chi router for routing
       - Include middleware for logging and request ID tracking
       - Add OpenAPI/Swagger documentation"

    - "Enhance the TODO API with the following features:
       - Add user authentication using JWT tokens
       - Associate todos with users (each user can only see/modify their own todos)
       - Add middleware to verify JWT tokens and extract user information
       - Update all handlers to handle user context
       - Add user registration and login endpoints
       - Update tests to handle authentication
       - Add rate limiting middleware to protect endpoints"

    - "Add advanced features to the TODO API:
       - Implement todo categories/tags for better organization
       - Add filtering by status, due date, and tags
       - Add sorting options (by due date, creation date, status)
       - Implement pagination for list endpoints
       - Add bulk operations (create/update/delete multiple todos)
       - Add due date notifications using background workers
       - Add metrics collection using Prometheus
       - Implement caching using Redis for frequently accessed data
       - Add API versioning" 